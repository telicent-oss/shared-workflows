name: Promote to Quay
description: |
  Promote a container image and/or Helm chart from Amazon ECR to Quay.io and sign with Cosign.
  At least one of `image` or `chart` must be provided.
author: Telicent

inputs:
  image:
    required: false
    description: The image name to promote (e.g. smart-cache-graph). Omit to skip image promotion.
  chart:
    required: false
    description: The Helm chart name to promote (e.g. graph). Omit to skip chart promotion.
  version:
    required: true
    description: The version to promote.
  role-to-assume:
    required: true
    description: The AWS IAM role to assume for tasks that require interaction with AWS, such as pushing a container image or Helm chart to ECR.
  quay-username:
    required: true
    description: Quay.io username.
  quay-token:
    required: true
    description: Quay.io token.
  quay-organisation:
    required: false
    default: telicent
    description: The Quay.io organisation to push to. Defaults to `telicent`.

outputs:
  image-digest:
    description: The digest of the image pushed to Quay.io. Empty if image promotion was skipped.
    value: ${{ steps.push-image.outputs.image-digest }}
  chart-ref:
    description: The digest-qualified chart reference pushed to Quay.io. Empty if chart promotion was skipped.
    value: ${{ steps.push-chart.outputs.chart-ref }}

runs:
  using: composite
  steps:
    ###
    # Dependency installation steps
    ###
    - name: Setup ORAS
      if: inputs.image != '' || inputs.chart != ''
      uses: oras-project/setup-oras@v1

    ###
    # Image promotion steps
    ###
    - name: Configure AWS credentials
      if: inputs.image != '' || inputs.chart != ''
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.role-to-assume != '' && inputs.role-to-assume || 'arn:aws:iam::098669589541:role/GitHubDeploymentRole' }}
        aws-region: eu-west-2
        mask-aws-account-id: true

    - name: Login to Amazon ECR
      if: inputs.image != '' || inputs.chart != ''
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      with:
        mask-password: true

    - name: Login to Quay
      # Docker login to Quay is required for either image or chart promotion
      # because `cosign` requires access to the registry to push signatures.
      if: inputs.image != '' || inputs.chart != ''
      uses: docker/login-action@v4.1.0
      with:
        registry: quay.io
        username: ${{ inputs.quay-username }}
        password: ${{ inputs.quay-token }}

    - name: Pull from ECR, retag and push to Quay
      if: inputs.image != ''
      id: push-image
      shell: bash
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        QUAY_ORG: ${{ inputs.quay-organisation }}
        IMAGE: ${{ inputs.image }}
        VERSION: ${{ inputs.version }}
        TEMP_DIR: ${{ runner.temp }}
      run: |
        oras cp oci://$ECR_REGISTRY/$IMAGE:$VERSION oci://quay.io/$QUAY_ORG/$IMAGE:$VERSION 2>&1 | tee "${TEMP_DIR}/docker-push-output.txt"
        DIGEST=$(grep "^Digest" "${TEMP_DIR}/docker-push-output.txt" | awk '{print $NF}')
        [[ -n "$DIGEST" ]] || { echo "Failed to parse digest from oras output"; exit 1; }
        echo "image-digest=$DIGEST" >> "$GITHUB_OUTPUT"
        echo "image-ref=quay.io/$QUAY_ORG/$IMAGE:$VERSION@$DIGEST" >> "$GITHUB_OUTPUT"

    ###
    # Chart promotion steps
    ###

    # `oras` and `cosign` both of those authenticate via ~/.docker/config.json,
    # so there is no need to use `helm registry login` here.
    - name: Copy Helm chart from ECR and push to Quay
      if: inputs.chart != ''
      id: push-chart
      shell: bash
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        QUAY_ORG: ${{ inputs.quay-organisation }}
        CHART: ${{ inputs.chart }}
        VERSION: ${{ inputs.version }}
        TEMP_DIR: ${{ runner.temp }}
      run: |
        oras cp oci://$ECR_REGISTRY/charts/$CHART:$VERSION oci://quay.io/$QUAY_ORG/charts/$CHART:$VERSION 2>&1 | tee "${TEMP_DIR}/helm-push-output.txt"
        DIGEST=$(grep "^Digest" "${TEMP_DIR}/helm-push-output.txt" | awk '{print $NF}')
        [[ -n "$DIGEST" ]] || { echo "Failed to parse digest from oras output"; exit 1; }
        echo "chart-ref=quay.io/$QUAY_ORG/charts/$CHART:$VERSION@$DIGEST" >> "$GITHUB_OUTPUT"
        echo "## Helm Push Summary" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        cat "${TEMP_DIR}/helm-push-output.txt" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"

    ###
    # Image and chart signing steps
    ###
    - name: Install Cosign
      if: inputs.image != '' || inputs.chart != ''
      uses: sigstore/cosign-installer@v3

    - name: Sign image on Quay
      if: inputs.image != ''
      shell: bash
      env:
        IMAGE_REF: ${{ steps.push-image.outputs.image-ref }}
      run: cosign sign --yes "$IMAGE_REF"

    - name: Sign chart on Quay
      if: inputs.chart != ''
      shell: bash
      env:
        CHART_REF: ${{ steps.push-chart.outputs.chart-ref }}
      run: cosign sign --yes "$CHART_REF"
